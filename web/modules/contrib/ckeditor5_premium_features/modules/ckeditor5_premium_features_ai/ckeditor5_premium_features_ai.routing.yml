ckeditor5_premium_features_ai.admin:
  path: '/admin/config/ckeditor5-premium-features/ckeditor-ai'
  defaults:
    _controller: '\Drupal\system\Controller\SystemController::systemAdminMenuBlockPage'
    _title: 'CKEditor AI settings'
  requirements:
    _permission: 'administer ckeditor ai'
  options:
    _admin_route: TRUE

ckeditor5_premium_features_ai.settings:
  path: '/admin/config/ckeditor5-premium-features/ckeditor-ai/general-settings'
  defaults:
    _form: '\Drupal\ckeditor5_premium_features_ai\Form\SettingsForm'
    _title: 'CKEditor AI settings'
  requirements:
    _permission: 'administer ckeditor ai'
  options:
    _admin_route: TRUE
